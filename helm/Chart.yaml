apiVersion: v2
name: etl-platform
description: Full on-prem ETL platform — Kafka, Spark, ClickHouse, Ollama, Dashboard
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: kafka
    version: "30.1.5"
    repository: "https://charts.bitnami.com/bitnami"
    alias: kafka

  - name: clickhouse
    version: "6.3.6"
    repository: "https://charts.bitnami.com/bitnami"
    alias: clickhouse

  - name: spark
    version: "9.2.3"
    repository: "https://charts.bitnami.com/bitnami"
    alias: spark

  - name: postgresql
    version: "15.5.23"
    repository: "https://charts.bitnami.com/bitnami"
    alias: postgres

  - name: valkey
    version: "2.1.7"
    repository: "https://charts.bitnami.com/bitnami"
    alias: valkey

  - name: grafana
    version: "8.5.0"
    repository: "https://grafana.github.io/helm-charts"
    alias: grafana

  - name: prometheus
    version: "25.27.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    alias: prometheus

  - name: airflow
    version: "1.14.0"
    repository: "https://airflow.apache.org"
    alias: airflow
