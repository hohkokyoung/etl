global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:9363"]
    metrics_path: /metrics

  - job_name: "dashboard-api"
    static_configs:
      - targets: ["dashboard-api:8000"]
    metrics_path: /metrics

  - job_name: "spark"
    static_configs:
      - targets: ["spark-master:8080"]

  - job_name: "airflow"
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: /metrics

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]

alerting:
  alertmanagers: []

rule_files: []
